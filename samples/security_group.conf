# AWS Security Group: prod-web-sg
# Last modified: 2024-03-01
# Owner: platform-team

[INBOUND RULES]
Rule 1:  ALLOW  TCP  0.0.0.0/0       :22    # SSH - all sources
Rule 2:  ALLOW  TCP  0.0.0.0/0       :3389  # RDP - all sources
Rule 3:  ALLOW  TCP  0.0.0.0/0       :80    # HTTP
Rule 4:  ALLOW  TCP  0.0.0.0/0       :443   # HTTPS
Rule 5:  ALLOW  ALL  10.0.0.0/8      :*     # Internal - all traffic
Rule 6:  ALLOW  TCP  0.0.0.0/0       :5432  # PostgreSQL - all sources
Rule 7:  ALLOW  TCP  0.0.0.0/0       :6379  # Redis - all sources
Rule 8:  ALLOW  ICMP 0.0.0.0/0       :*     # Ping - all sources

[OUTBOUND RULES]
Rule 1:  ALLOW  ALL  0.0.0.0/0       :*     # All outbound traffic
